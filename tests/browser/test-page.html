<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Transformer WASM Test</title>
</head>
<body>
  <h1>Graph Transformer WASM Test Page</h1>
  <div id="status">Loading WASM module...</div>
  <div id="results"></div>

  <script type="module">
    // This page is served by Playwright for testing WASM modules
    window.testResults = {
      loaded: false,
      error: null,
      performance: {},
    };

    try {
      // WASM modules will be imported dynamically by test scripts
      window.testResults.loaded = true;
      document.getElementById('status').textContent = 'Ready for testing';
    } catch (error) {
      window.testResults.error = error.message;
      document.getElementById('status').textContent = 'Error: ' + error.message;
    }
  </script>
</body>
</html>
